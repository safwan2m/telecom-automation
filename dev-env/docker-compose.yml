services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  # ── 5G/4G NSA Core ────────────────────────────────────────────────────────

  core-sim:
    build:
      context: ./simulators/core
    container_name: core-sim
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN}
      INFLUX_ORG: ${INFLUXDB_ORG}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET}
      INTERVAL_SEC: "10"

  # ── Planning API ──────────────────────────────────────────────────────────

  planning-api:
    build:
      context: ../agents/planning
    container_name: planning-api
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      CONTROLLER_URL: http://controller:8080

  # ── KPI Agent ─────────────────────────────────────────────────────────────

  kpi-agent:
    build:
      context: ../agents/kpi_agent
    container_name: kpi-agent
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN}
      INFLUX_ORG: ${INFLUXDB_ORG}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET}
      CONTROLLER_URL: http://controller:8080
      POLL_INTERVAL_SEC: "30"
      OVERLOAD_PRB_PCT: "85"
      UNDERLOAD_PRB_PCT: "20"
      SINR_MIN_DB: "5"
      POWER_WASTE_W: "500"
      POWER_WASTE_MIN_UES: "15"

  # ── Orchestrator Agent ────────────────────────────────────────────────────

  orchestrator:
    build:
      context: ../agents/orchestrator
    container_name: orchestrator
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      influxdb:
        condition: service_healthy
    # Mount host ~/.claude so the container's `claude -p` CLI shares your login.
    # On Windows: USERPROFILE=C:\Users\<you>  → mounts C:\Users\<you>\.claude
    # On Mac/Linux: HOME=/home/<you>          → set CLAUDE_HOME in .env instead
    volumes:
      - "${USERPROFILE}/.claude:/root/.claude"
    environment:
      # ── Gemini backend (used when CLAUDE_CLI_PATH is empty) ──
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: gemini-2.5-flash
      # ── Claude CLI backend (active when CLAUDE_CLI_PATH is non-empty) ──
      # Always points to the npm-installed binary inside the container.
      # Host CLAUDE_CLI_PATH (Windows path) is intentionally NOT forwarded here.
      CLAUDE_CLI_PATH: /usr/bin/claude
      ANTHROPIC_MODEL_NAME: ${ANTHROPIC_MODEL_NAME:-sonnet}
      # ── Shared ──
      CONTROLLER_URL: http://controller:8080
      PLANNING_URL: http://planning-api:8081
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN}
      INFLUX_ORG: ${INFLUXDB_ORG}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET}

  # ── Network Map Server ────────────────────────────────────────────────────

  map-server:
    build:
      context: ../agents/map_server
    container_name: map-server
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      - controller
      - orchestrator
    environment:
      CONTROLLER_URL: http://controller:8080
      ORCHESTRATOR_URL: http://orchestrator:8082

  # ── Controller (single control plane) ────────────────────────────────────

  controller:
    build:
      context: ../agents/controller
    container_name: controller
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN}
      INFLUX_ORG: ${INFLUXDB_ORG}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET}
      TOPOLOGY_FILE: /config/topology.json
    volumes:
      - ./config:/config

  # ── Centralised Unit (1 CU — Malleswaram) ────────────────────────────────

  cu-mls:
    build:
      context: ./simulators/cu
    container_name: cu-mls
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      CU_ID: CU-MLS
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN}
      INFLUX_ORG: ${INFLUXDB_ORG}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET}
      INTERVAL_SEC: "10"
      TOPO_POLL_SEC: "5"
      TOPOLOGY_FILE: /config/topology.json
    volumes:
      - ./config:/config:ro

  # ── Distributed Units (3 DUs — north / central / south-west Malleswaram) ─

  du-mls-1:
    build:
      context: ./simulators/du
    container_name: du-mls-1
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      DU_ID: DU-MLS-1
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN}
      INFLUX_ORG: ${INFLUXDB_ORG}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET}
      INTERVAL_SEC: "10"
      TOPO_POLL_SEC: "5"
      TOPOLOGY_FILE: /config/topology.json
    volumes:
      - ./config:/config:ro

  du-mls-2:
    build:
      context: ./simulators/du
    container_name: du-mls-2
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      DU_ID: DU-MLS-2
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN}
      INFLUX_ORG: ${INFLUXDB_ORG}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET}
      INTERVAL_SEC: "10"
      TOPO_POLL_SEC: "5"
      TOPOLOGY_FILE: /config/topology.json
    volumes:
      - ./config:/config:ro

  du-mls-3:
    build:
      context: ./simulators/du
    container_name: du-mls-3
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      DU_ID: DU-MLS-3
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN}
      INFLUX_ORG: ${INFLUXDB_ORG}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET}
      INTERVAL_SEC: "10"
      TOPO_POLL_SEC: "5"
      TOPOLOGY_FILE: /config/topology.json
    volumes:
      - ./config:/config:ro

volumes:
  influxdb_data:
  influxdb_config:
  grafana_data:
